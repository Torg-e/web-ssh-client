{% extends "base.html" %}
{% block title %}Commands – SSH Vault{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/css/commands.css">
{% endblock %}

{% block content %}
<div class="container">
    <div class="page-header">
        <h1 class="page-title">
            <span class="mi mi-lg" style="color:var(--green-primary)">menu_book</span>
            Command <span>Database</span>
        </h1>
        <button onclick="toggleAddForm()" class="btn btn-primary"><span class="mi mi-sm">add</span> New Command</button>
    </div>

    <div class="card mb-2" style="padding:0.75rem 1.25rem">
        <div style="display:flex;gap:0.75rem;align-items:center">
            <span class="mi" style="color:var(--text-muted)">search</span>
            <input type="text" id="cmdSearch" class="form-control" placeholder="Search commands..." style="border:none;background:transparent;padding:0;font-size:1rem" oninput="filterSnippets()">
        </div>
    </div>

    <div class="card mb-2" id="addForm" style="display:none">
        <div class="card-header">
            <span class="mi" style="color:var(--green-primary)">add_circle</span>
            <h2 class="card-title">Add New Command</h2>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem">
            <div class="form-group"><label class="form-label">Category</label><input type="text" id="newCat" class="form-control" placeholder="e.g. Docker" value="Custom"></div>
            <div class="form-group"><label class="form-label">Title *</label><input type="text" id="newTitle" class="form-control" placeholder="Command title"></div>
        </div>
        <div class="form-group"><label class="form-label">Command *</label><textarea id="newCmd" class="form-control" placeholder="docker ps -a" style="min-height:60px"></textarea></div>
        <div class="form-group"><label class="form-label">Description</label><textarea id="newDesc" class="form-control" placeholder="What does this command do?" style="min-height:60px;font-family:var(--font-sans)"></textarea></div>
        <div class="btn-group"><button onclick="saveNewSnippet()" class="btn btn-primary"><span class="mi mi-sm">save</span> Save</button><button onclick="toggleAddForm()" class="btn btn-secondary">Cancel</button></div>
    </div>

    <div id="snippetsContainer"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const CSRF = document.querySelector('meta[name="csrf-token"]').content;
let allSnippets = {};

function loadAllSnippets() {
    fetch('/api/snippets', { headers: {'X-CSRFToken': CSRF} })
    .then(r => r.json())
    .then(data => { allSnippets = data; renderSnippets(data); });
}

function renderSnippets(data) {
    const c = document.getElementById('snippetsContainer');
    if (!Object.keys(data).length) {
        c.innerHTML = '<div class="empty-state"><span class="mi" style="font-size:48px">menu_book</span><h3>No commands yet</h3><p>Add your first command.</p></div>';
        return;
    }
    let h = '';
    for (const [cat, items] of Object.entries(data)) {
        h += `<div class="card mb-2"><div class="card-header"><span class="mi" style="color:var(--green-primary)">folder</span><h2 class="card-title">${esc(cat)}</h2><span class="text-muted" style="font-size:0.75rem;margin-left:auto">${items.length} commands</span></div>`;
        h += '<div style="display:flex;flex-direction:column;gap:0.5rem">';
        for (const s of items) {
            h += `<div class="snippet-item" style="padding:0.75rem;border:1px solid var(--border-color);border-radius:var(--radius);cursor:default">
                <div class="snippet-item-content" style="flex:1">
                    <div class="snippet-item-title">${esc(s.title)} ${s.is_global ? '<span style="font-size:0.625rem;color:var(--text-muted);background:var(--bg-tertiary);padding:0.1rem 0.375rem;border-radius:3px">GLOBAL</span>' : ''}</div>
                    <div class="snippet-item-cmd" style="white-space:pre-wrap;margin-top:0.25rem">${esc(s.command)}</div>
                    ${s.description ? `<div class="snippet-item-desc" style="margin-top:0.25rem">${esc(s.description)}</div>` : ''}
                </div>
                <div style="display:flex;gap:0.25rem;flex-shrink:0;align-items:flex-start">
                    <button class="btn btn-ghost btn-xs copy-btn" data-cmd="${esc(s.command)}" title="Copy"><span class="mi mi-sm">content_copy</span></button>
                    ${!s.is_global ? `<button class="btn btn-ghost btn-xs del-btn" data-id="${s.id}" title="Delete" style="color:var(--danger)"><span class="mi mi-sm">delete</span></button>` : ''}
                </div>
            </div>`;
        }
        h += '</div></div>';
    }
    c.innerHTML = h;
}

document.getElementById('snippetsContainer').addEventListener('click', function(e) {
    const copyBtn = e.target.closest('.copy-btn');
    if (copyBtn) { e.stopPropagation(); copyToClipboard(copyBtn.dataset.cmd); }
    const delBtn = e.target.closest('.del-btn');
    if (delBtn) { e.stopPropagation(); deleteSnippet(parseInt(delBtn.dataset.id)); }
});

function filterSnippets() {
    const q = document.getElementById('cmdSearch').value.toLowerCase();
    if (!q) { renderSnippets(allSnippets); return; }
    const filtered = {};
    for (const [cat, items] of Object.entries(allSnippets)) {
        const matched = items.filter(s =>
            s.title.toLowerCase().includes(q) || s.command.toLowerCase().includes(q) ||
            (s.description && s.description.toLowerCase().includes(q)) || cat.toLowerCase().includes(q)
        );
        if (matched.length) filtered[cat] = matched;
    }
    renderSnippets(filtered);
}

function toggleAddForm() {
    const f = document.getElementById('addForm');
    f.style.display = f.style.display === 'none' ? 'block' : 'none';
}

function saveNewSnippet() {
    const d = {
        category: document.getElementById('newCat').value || 'Custom',
        title: document.getElementById('newTitle').value,
        command: document.getElementById('newCmd').value,
        description: document.getElementById('newDesc').value
    };
    if (!d.title || !d.command) { showError('Title and command are required'); return; }
    fetch('/api/snippets', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': CSRF },
        body: JSON.stringify(d)
    })
    .then(r => {
        if (!r.ok) {
            return r.json().catch(() => ({})).then(d => { showError(d.error || 'Failed to save'); throw new Error('fail'); });
        }
        loadAllSnippets();
        toggleAddForm();
        ['newTitle', 'newCmd', 'newDesc'].forEach(id => document.getElementById(id).value = '');
    })
    .catch(() => {});
}

function deleteSnippet(id) {
    showConfirm('Delete command?', () => {
        fetch(`/api/snippets/${id}`, { method: 'DELETE', headers: { 'X-CSRFToken': CSRF } })
        .then(r => {
            if (!r.ok) {
                return r.json().catch(() => ({})).then(d => { showError(d.error || 'Failed to delete'); throw new Error('fail'); });
            }
            loadAllSnippets();
        })
        .catch(() => {});
    });
}

function copyToClipboard(text) {
    navigator.clipboard.writeText(text);
}

function esc(t) {
    if (!t) return '';
    const d = document.createElement('div');
    d.textContent = t;
    return d.innerHTML;
}

loadAllSnippets();
</script>
{% endblock %}
